<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geolocation Dashboard</title><link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script><!-- Google Font --><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet"><style>
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f172a;
  color:#e2e8f0;
}

.container{
  display:flex;
  height:100vh;
}

#map{
  flex:3;
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar{
  flex:1;
  padding:20px;
  background:linear-gradient(180deg,#020617,#0f172a);
  display:flex;
  flex-direction:column;
  gap:15px;
}

.header{
  font-size:18px;
  font-weight:600;
  margin-bottom:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:16px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.metric{
  font-size:26px;
  font-weight:600;
  margin-top:5px;
}

.label{
  font-size:12px;
  color:#94a3b8;
}

.status{
  display:flex;
  align-items:center;
  gap:10px;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

.footer{
  margin-top:auto;
  font-size:11px;
  color:#64748b;
  text-align:center;
}

</style></head><body><div class="container">
  <div id="map"></div>  <div class="sidebar">
    <div class="header">🌍 Geo Monitoring</div><div class="card">
  <div class="label">Total Active Users</div>
  <div class="metric" id="totalUser">0</div>
</div>

<div class="card">
  <div class="label">Current Coordinates</div>
  <div class="metric">
    <span id="dLat">-</span>,
    <span id="dLon">-</span>
  </div>
</div>

<div class="card">
  <div class="label">System Status</div>
  <div class="status">
    <div class="dot"></div>
    <span>Online</span>
  </div>
</div>

<div class="footer">
  Microservices Geolocation Dashboard v2.0
</div>

  </div>
</div><script type="module" src="js/dashboard.js"></script></body>
</html>
